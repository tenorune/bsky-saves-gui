name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Seed .env from example
        run: cp .env.example .env

      - run: pnpm check

      - run: pnpm test

      - name: Test Cloudflare Worker
        run: pnpm exec vitest run --config templates/cf-worker/vitest.config.ts
        timeout-minutes: 3

      - run: pnpm build

      - name: Confirm CNAME is in dist
        run: |
          test -f dist/CNAME
          cat dist/CNAME
